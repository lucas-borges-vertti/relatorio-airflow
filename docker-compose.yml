services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: relatorio_postgres
    environment:
      POSTGRES_USER: relatorio_user
      POSTGRES_PASSWORD: relatorio_pass
      POSTGRES_DB: relatorio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relatorio_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - relatorio_network

  # NestJS API
  nestjs-api:
    build:
      context: ./nestjs
      dockerfile: Dockerfile
    container_name: relatorio_nestjs
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: relatorio_user
      DB_PASSWORD: relatorio_pass
      DB_DATABASE: relatorio_db
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_DAG_ID: report_generation_dag
      AIRFLOW_API_USER: airflow
      AIRFLOW_API_PASSWORD: airflow
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nestjs/src:/app/src
    networks:
      - relatorio_network

  # Airflow Webserver
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: relatorio_airflow
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@airflow-postgres:5432/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      NESTJS_API_URL: http://nestjs-api:3000
      # Credenciais Oracle — forneça os valores reais no arquivo .env
      ORACLE_HOST: ${ORACLE_HOST:-10.100.20.169}
      ORACLE_PORT: ${ORACLE_PORT:-1521}
      ORACLE_USER: ${ORACLE_USER:-VRT_NTR}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-CNSDTOTC}
      ORACLE_SERVICE_NAME: ${ORACLE_SERVICE_NAME:-vtihom1}
      AIRFLOW_CLIENT_SCHEMA_MAP_PATH: /opt/airflow/config/client_schema_map.json
      SMTP_HOST: ${SMTP_HOST:-smtp.velog.com.br}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-no-reply@velog.com.br}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@velog.com.br}
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres
    networks:
      - relatorio_network

  # Airflow PostgreSQL (separate from NestJS DB)
  airflow-postgres:
    image: postgres:16-alpine
    container_name: relatorio_airflow_postgres
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_db
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - relatorio_network

volumes:
  postgres_data:
  airflow_logs:
  airflow_postgres_data:

networks:
  relatorio_network:
    driver: bridge
