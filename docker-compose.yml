services:
  # Airflow Webserver
  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: relatorio_airflow
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@airflow-postgres:5432/airflow_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      APP_ENV: ${APP_ENV}
      NESTJS_API_URL: ${NESTJS_API_URL}
      ORACLE_HOST: ${ORACLE_HOST}
      ORACLE_PORT: ${ORACLE_PORT}
      ORACLE_USER: ${ORACLE_USER}
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_SERVICE_NAME: ${ORACLE_SERVICE_NAME}
      ORACLE_DSN: ${ORACLE_DSN:-}
      AIRFLOW_CLIENT_SCHEMA_MAP_PATH: /opt/airflow/config/client_schema_map.json
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY}
      REPORTS_PUBLIC_URL: ${REPORTS_PUBLIC_URL}
    extra_hosts:
      - "host-gateway:host-gateway"
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/config:/opt/airflow/config
      - ./airflow/logos:/opt/airflow/logos
      - airflow_logs:/opt/airflow/logs
    depends_on:
      - airflow-postgres
    networks:
      - relatorio_network

  # Airflow PostgreSQL (separate from NestJS DB)
  airflow-postgres:
    image: postgres:16-alpine
    container_name: relatorio_airflow_postgres
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_db
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - relatorio_network

volumes:
  airflow_logs:
  airflow_postgres_data:

networks:
  relatorio_network:
    driver: bridge
